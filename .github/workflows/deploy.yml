name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - hosting
          - functions

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          CI: false
          REACT_APP_ONEDRIVE_CLIENT_ID: ${{ secrets.REACT_APP_ONEDRIVE_CLIENT_ID }}
          REACT_APP_ONEDRIVE_TENANT_ID: ${{ secrets.REACT_APP_ONEDRIVE_TENANT_ID }}
          REACT_APP_ONEDRIVE_REDIRECT_URI: ${{ secrets.REACT_APP_ONEDRIVE_REDIRECT_URI }}
          REACT_APP_ONEDRIVE_DRIVE_OWNER: ${{ secrets.REACT_APP_ONEDRIVE_DRIVE_OWNER }}
          REACT_APP_ONEDRIVE_PROPOSAL_ROOT: ${{ secrets.REACT_APP_ONEDRIVE_PROPOSAL_ROOT }}
          REACT_APP_ONEDRIVE_EXECUTION_ROOT: ${{ secrets.REACT_APP_ONEDRIVE_EXECUTION_ROOT }}

      - name: Deploy to Firebase (all)
        if: ${{ github.event_name == 'push' || inputs.target == 'all' }}
        run: bash scripts/firebase-deploy.sh
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase (hosting only)
        if: ${{ inputs.target == 'hosting' }}
        run: bash scripts/firebase-deploy.sh --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase (functions only)
        if: ${{ inputs.target == 'functions' }}
        run: bash scripts/firebase-deploy.sh --only functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
